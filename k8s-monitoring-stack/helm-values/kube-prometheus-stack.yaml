prometheus:
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

grafana:
  service:
    type: NodePort
    nodePort: 30300
  adminPassword: admin
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

alertmanager:
  service:
    type: NodePort
    nodePort: 30903
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack
      group_by: ["alertname", "namespace"]
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - receiver: slack
          matchers:
            - alertname =~ "SpringBootDown|PodCrashLooping|PodNotReady|HighMemoryUsage|HighCPUUsage|KafkaExporterDown"
    receivers:
      - name: "null"
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook/webhook-url
            channel: "#alerts"
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              *Namespace:* {{ .CommonLabels.namespace }}

              *Description:* {{ .CommonAnnotations.description }}
  alertmanagerSpec:
    secrets:
      - slack-webhook

# kind 경량화
kubeStateMetrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

nodeExporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
