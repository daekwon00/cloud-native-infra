apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: local-dev-app
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - dev
  selector:
    matchLabels:
      app: local-dev-app
  endpoints:
    - port: "8080"
      path: /actuator/prometheus
      interval: 15s
      targetPort: 8080
